<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROPHET FIELD</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #5ecec0;
  --bg2:      #4ab8aa;
  --surface:  #d6f5ef;
  --surface2: #c2ede5;
  --panel:    #e8faf6;
  --border:   #3a9e90;
  --border2:  #2d8070;
  --header:   #2e9e8a;
  --header2:  #1d7a68;
  --footer:   #2e9e8a;
  --text:     #1a4a40;
  --text2:    #2d7060;
  --muted:    #5a8880;
  --gold:     #d4a017;
  --gold2:    #f0c030;
  --red:      #c0392b;
  --red2:     #e74c3c;
  --blue:     #2471a3;
  --blue2:    #5dade2;
  --green:    #1e8449;
  --green2:   #27ae60;
  --hp-bar:   #27ae60;
  --mp-bar:   #5dade2;
  --atk-bg:   #e8f8e8;
  --atk-border:#3a9e50;
  --def-bg:   #e8eef8;
  --def-border:#3a50ae;
  --itm-bg:   #f8f4e0;
  --itm-border:#ae9030;
  --mir-bg:   #f4e8f8;
  --mir-border:#8030ae;
  --white:    #ffffff;
  --shadow:   rgba(0,0,0,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===================== SCREENS ===================== */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; height: 100vh; }

/* ===================== LOBBY ===================== */
#screen-lobby {
  background: linear-gradient(160deg, #5ecec0 0%, #3aa898 100%);
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  padding: 2rem;
}

.logo-wrap { text-align: center; }
.logo-main {
  font-size: clamp(2rem, 7vw, 4rem);
  font-weight: 800;
  color: var(--white);
  text-shadow: 0 3px 0 var(--border2), 0 5px 12px rgba(0,0,0,0.2);
  letter-spacing: 0.05em;
  line-height: 1;
}
.logo-sub {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.15em;
  margin-top: 0.3rem;
}

.lobby-row {
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 780px;
}

.lobby-panel {
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 1.4rem;
  flex: 1;
  min-width: 260px;
  max-width: 360px;
  box-shadow: 0 4px 0 var(--border2), 0 6px 16px var(--shadow);
}

.lobby-panel-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--header);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--surface2);
}

.field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.9rem; }
.field label { font-size: 0.7rem; font-weight: 700; color: var(--text2); }
input[type="text"] {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  padding: 0.55rem 0.8rem;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: var(--header); }
input[type="text"]::placeholder { color: #aaa; }

.btn {
  font-family: inherit;
  font-weight: 800;
  font-size: 0.85rem;
  padding: 0.7rem 1.2rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  width: 100%;
  transition: all 0.1s;
  letter-spacing: 0.05em;
}
.btn:active { transform: translateY(2px); }
.btn-green {
  background: var(--header);
  color: var(--white);
  box-shadow: 0 3px 0 var(--border2);
}
.btn-green:hover { background: var(--header2); }
.btn-green:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-outline {
  background: var(--white);
  color: var(--header);
  border: 2px solid var(--header);
  box-shadow: 0 3px 0 var(--border2);
}
.btn-outline:hover { background: var(--surface); }
.btn-red {
  background: var(--red);
  color: var(--white);
  box-shadow: 0 2px 0 #922b21;
  font-size: 0.75rem;
  padding: 0.5rem 1rem;
}
.btn-red:hover { background: var(--red2); }

#status-msg {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.8);
  text-align: center;
  min-height: 1.4em;
}
#status-msg.err { color: #ffaaaa; }
#status-msg.ok { color: #aaffdd; }

/* ===================== WAITING ===================== */
#screen-waiting {
  background: linear-gradient(160deg, #5ecec0 0%, #3aa898 100%);
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  padding: 2rem;
}

.wait-panel {
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 1.4rem;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 4px 0 var(--border2), 0 6px 16px var(--shadow);
}

.room-code-box {
  background: var(--white);
  border: 2px dashed var(--header);
  border-radius: 10px;
  padding: 0.8rem 1.2rem;
  text-align: center;
  cursor: pointer;
  margin-bottom: 1rem;
  transition: background 0.15s;
}
.room-code-box:hover { background: var(--surface); }
.room-code-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
.room-code-val { font-size: 1.5rem; font-weight: 800; color: var(--header); letter-spacing: 0.1em; }

.player-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.player-item {
  display: flex; align-items: center; gap: 0.6rem;
  background: var(--surface2);
  border-radius: 8px;
  padding: 0.45rem 0.8rem;
  font-size: 0.9rem; font-weight: 700;
}
.badge {
  font-size: 0.55rem; font-weight: 800; letter-spacing: 0.08em;
  padding: 0.15rem 0.4rem; border-radius: 4px;
  text-transform: uppercase;
}
.badge-host { background: var(--gold2); color: #5a3a00; }
.badge-you  { background: var(--blue2); color: var(--white); }

.wait-actions { display: flex; gap: 0.6rem; }
#status-wait { font-size: 0.8rem; color: rgba(255,255,255,0.75); text-align: center; }
.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

/* ===================== GAME LAYOUT ===================== */
#screen-game {
  display: none;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
#screen-game.active { display: flex; }

/* --- Header bar --- */
.g-header {
  background: var(--header);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0.8rem;
  height: 38px;
  flex-shrink: 0;
  box-shadow: 0 2px 0 var(--border2);
  gap: 0.5rem;
}
.g-header-left { display: flex; align-items: center; gap: 0.5rem; font-weight: 800; font-size: 0.9rem; }
.g-title { font-size: 0.85rem; font-weight: 800; }
.gf-badge {
  background: var(--gold2);
  color: #4a3000;
  font-size: 0.7rem; font-weight: 800;
  padding: 0.15rem 0.6rem;
  border-radius: 20px;
}
.g-header-right { display: flex; align-items: center; gap: 0.5rem; }
.header-btn {
  background: rgba(255,255,255,0.18);
  border: none;
  color: var(--white);
  font-family: inherit;
  font-size: 0.7rem; font-weight: 700;
  padding: 0.25rem 0.7rem;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.header-btn:hover { background: rgba(255,255,255,0.3); }

/* --- Main body --- */
.g-body {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr;
  overflow: hidden;
  min-height: 0;
}

/* --- Left panel: active card + player list --- */
.g-left {
  background: var(--bg);
  border-right: 2px solid var(--border2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Active card display (top-left, like "硬いつち" in screenshot) */
.active-card-display {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0.6rem;
  min-height: 90px;
  display: flex;
  gap: 0.6rem;
  align-items: stretch;
}
.active-card-display.empty { opacity: 0; pointer-events: none; }

.acd-icon {
  width: 70px; min-width: 70px; height: 70px;
  border: 2px solid var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
  background: var(--white);
  flex-shrink: 0;
}
.acd-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
.acd-name { font-size: 0.95rem; font-weight: 800; color: var(--text); }
.acd-stat { font-size: 0.85rem; font-weight: 700; color: var(--text2); }
.acd-cost {
  align-self: flex-end;
  background: var(--gold2);
  color: #4a3000;
  font-size: 0.75rem; font-weight: 800;
  padding: 0.15rem 0.5rem;
  border-radius: 20px;
}

/* Attack value big display */
.atk-big-display {
  background: var(--atk-bg);
  border: 2px solid var(--atk-border);
  border-radius: 10px;
  padding: 0.4rem 1rem;
  margin: 0.5rem 0.6rem 0;
  font-size: 1.1rem; font-weight: 800;
  color: var(--text);
  text-align: center;
  display: none;
}
.atk-big-display.active { display: block; }

/* Player list in left panel */
.player-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0.6rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

/* Player bar (horizontal, like in screenshot) */
.pbar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 0.3rem 0.8rem 0.3rem 0.4rem;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.pbar.active-turn { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold2); }
.pbar.dead { opacity: 0.35; pointer-events: none; }
.pbar.me { border-color: var(--blue2); }
.pbar:hover:not(.dead) { background: var(--surface2); }

.pbar-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #aaa;
  flex-shrink: 0;
  border: 2px solid #888;
}
.pbar.active-turn .pbar-dot { background: var(--gold2); border-color: var(--gold); }
.pbar.me .pbar-dot { background: var(--blue2); border-color: var(--blue); }

.pbar-name { flex: 1; font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pbar-stats { font-size: 0.65rem; font-weight: 700; color: var(--text2); white-space: nowrap; }
.pbar-stats span { margin-left: 0.3rem; }
.pbar-hp { color: var(--green); }
.pbar-mp { color: var(--blue); }
.pbar-gd { color: var(--gold); }

/* Turn arrow */
.turn-arrow {
  font-size: 1.2rem;
  color: #e91e8c;
  flex-shrink: 0;
  display: none;
}
.pbar.active-turn .turn-arrow { display: block; }

/* --- Center panel --- */
.g-center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Top area: opponent's last action (right side of screenshot) */
.opp-action-area {
  padding: 0.6rem 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  border-bottom: 2px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.opp-action-title {
  font-size: 0.65rem; font-weight: 800;
  color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
}
.opp-action-card {
  display: flex; gap: 0.5rem; align-items: center;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 0.4rem 0.8rem;
}
.opp-action-card .acd-icon { width: 44px; min-width: 44px; height: 44px; font-size: 1.5rem; border-radius: 6px; }
.opp-action-info .acd-name { font-size: 0.85rem; }
.opp-action-info .acd-stat { font-size: 0.75rem; }

/* Defense window */
.defense-window {
  background: rgba(52,152,219,0.12);
  border: 2px solid var(--blue2);
  border-radius: 10px;
  margin: 0.4rem 0.8rem;
  padding: 0.6rem 0.8rem;
  display: none;
  gap: 0.8rem;
  align-items: center;
  flex-shrink: 0;
}
.defense-window.active { display: flex; }
.def-text { flex: 1; font-size: 0.82rem; font-weight: 700; line-height: 1.5; }
.def-text .attacker { color: var(--red2); }
.def-text .def-card-name { color: #8030ae; font-style: italic; }
.def-timer-circle {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--blue2); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; font-weight: 800;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(52,152,219,0.4);
}

/* Broadcast log (お告げ) */
.broadcast-log {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}
.log-line {
  font-size: 0.82rem;
  font-weight: 700;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  line-height: 1.4;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none} }
.log-line.system { color: var(--muted); font-weight: 400; font-style: italic; }
.log-line.attack { background: rgba(231,76,60,0.08); color: var(--text); }
.log-line.heal   { background: rgba(39,174,96,0.08); color: var(--text); }
.log-line.item   { background: rgba(212,160,23,0.08); color: var(--text); }
.log-line.dead   { background: rgba(231,76,60,0.15); color: var(--red); font-weight: 800; }
.log-actor  { color: var(--header2); font-weight: 800; }
.log-target { color: var(--red); font-weight: 800; }
.log-card   { color: #8030ae; font-style: italic; }
.log-val    { font-weight: 800; }

/* My area (bottom) */
.my-area {
  background: var(--surface2);
  border-top: 2px solid var(--border2);
  flex-shrink: 0;
  padding: 0.5rem 0.8rem;
}

/* My stat bar */
.my-stat-bar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
}
.my-name { font-size: 0.9rem; font-weight: 800; color: var(--text); margin-right: auto; }
.stat-chip {
  display: flex; align-items: center; gap: 0.3rem;
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 0.2rem 0.6rem;
  font-size: 0.8rem; font-weight: 800;
}
.stat-chip .icon { font-size: 0.85rem; }
.stat-chip.hp { border-color: var(--green); color: var(--green); }
.stat-chip.mp { border-color: var(--blue); color: var(--blue); }
.stat-chip.gd { border-color: var(--gold); color: var(--gold); }

/* Hand */
.hand-area {
  display: flex;
  gap: 0.35rem;
  overflow-x: auto;
  padding-bottom: 0.3rem;
  align-items: flex-end;
  min-height: 100px;
}
.hand-area::-webkit-scrollbar { height: 4px; }
.hand-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Card in hand */
.card {
  width: 76px; min-width: 76px;
  border-radius: 10px;
  border: 2.5px solid var(--border);
  background: var(--white);
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  overflow: hidden;
  flex-shrink: 0;
  user-select: none;
  position: relative;
}
.card:hover { transform: translateY(-10px); box-shadow: 0 8px 20px var(--shadow); z-index: 5; }
.card.selected { transform: translateY(-14px); box-shadow: 0 10px 24px rgba(0,0,0,0.25); z-index: 6; border-width: 3px; }
.card.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.card.defense-highlight { border-color: var(--blue2) !important; }
.card.defense-highlight:hover { box-shadow: 0 8px 20px rgba(52,152,219,0.4); }

.card[data-type="attack"]  { border-color: var(--atk-border); background: var(--atk-bg); }
.card[data-type="attack"].selected { border-color: var(--red2); }
.card[data-type="defense"] { border-color: var(--def-border); background: var(--def-bg); }
.card[data-type="defense"].selected { border-color: var(--blue2); }
.card[data-type="item"]    { border-color: var(--itm-border); background: var(--itm-bg); }
.card[data-type="item"].selected { border-color: var(--gold); }
.card[data-type="miracle"] { border-color: var(--mir-border); background: var(--mir-bg); }
.card[data-type="miracle"].selected { border-color: var(--mir-border); }

.card-icon {
  height: 58px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  border-bottom: 1.5px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.5);
  position: relative;
}
/* Placeholder for future image */
.card-icon img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset:0; border-radius: 0; }

.card-footer {
  padding: 0.25rem 0.35rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-stat { font-size: 0.7rem; font-weight: 800; color: var(--text2); }
.card-cost {
  background: var(--gold2);
  color: #4a2000;
  font-size: 0.6rem; font-weight: 800;
  padding: 0.1rem 0.35rem;
  border-radius: 20px;
}

/* Action buttons row */
.action-row {
  display: flex; align-items: center; gap: 0.5rem;
  margin-top: 0.5rem;
  flex-wrap: wrap;
}
.target-select {
  font-family: inherit;
  font-size: 0.78rem; font-weight: 700;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.35rem 0.6rem;
  cursor: pointer; outline: none;
  max-width: 140px;
}
.target-select:focus { border-color: var(--header); }

.act-btn {
  font-family: inherit;
  font-size: 0.72rem; font-weight: 800;
  padding: 0.4rem 0.8rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.act-btn:active { transform: translateY(1px); }
.act-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
.act-attack { background: #e74c3c; color: #fff; box-shadow: 0 2px 0 #922b21; }
.act-attack:hover:not(:disabled) { background: #c0392b; }
.act-pray   { background: var(--gold2); color: #4a3000; box-shadow: 0 2px 0 #b8860b; }
.act-pray:hover:not(:disabled) { background: #e0b020; }
.act-end    { background: var(--green2); color: #fff; box-shadow: 0 2px 0 #1a7a40; }
.act-end:hover:not(:disabled) { background: var(--green); }
.act-use    { background: var(--blue2); color: #fff; box-shadow: 0 2px 0 #1a60a0; }
.act-use:hover:not(:disabled) { background: var(--blue); }

/* Footer bar */
.g-footer {
  background: var(--footer);
  height: 28px;
  display: flex;
  align-items: center;
  padding: 0 0.8rem;
  gap: 0.5rem;
  flex-shrink: 0;
  box-shadow: 0 -2px 0 var(--border2);
}
.footer-myname {
  color: rgba(255,255,255,0.9);
  font-size: 0.72rem; font-weight: 800;
  margin-right: 0.5rem;
}
.footer-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: var(--white);
  font-family: inherit;
  font-size: 0.68rem; font-weight: 700;
  padding: 0.2rem 0.7rem;
  border-radius: 20px;
  cursor: pointer;
  display: flex; align-items: center; gap: 0.3rem;
  transition: background 0.15s;
}
.footer-btn:hover { background: rgba(255,255,255,0.32); }
.footer-spacer { flex: 1; }

/* Float damage */
.float-dmg {
  position: fixed;
  font-size: 1.6rem; font-weight: 800;
  pointer-events: none; z-index: 999;
  animation: floatUp 1.2s ease forwards;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1.1); }
  100% { opacity:0; transform:translateY(-70px) scale(0.8); }
}

/* Overlay */
#overlay {
  position: fixed; inset: 0;
  background: rgba(20,60,50,0.88);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 0.8rem;
}

.ov-title {
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 800;

  text-shadow: 0 4px 16px rgba(0,0,0,0.4);

}

/* Toast */

  background: var(--text);

}

::-webkit-scrollbar-track { background: transparent; }

}
</style>
</head>

</div>

<div id="toast"></div>

<script>
// ================================================================
// PROPHET FIELD v2 — Godfield-style UI
// Host-relay P2P via PeerJS
// ================================================================

// ---- CARD POOL ----
const CARD_POOL = [
  { id:'atk_sword',   type:'attack',  name:'鉄の剣',      emoji:'⚔️',  atk:8,   cost:2  },
  { id:'atk_spear',   type:'attack',  name:'聖なる槍',    emoji:'🔱',  atk:12,  cost:3  },
  { id:'atk_fire',    type:'attack',  name:'炎の矢',      emoji:'🔥',  atk:15,  cost:4  },
  { id:'atk_arrow',   type:'attack',  name:'暗黒の矢',    emoji:'🏹',  atk:10,  cost:2  },
  { id:'atk_thunder', type:'attack',  name:'雷撃',        emoji:'⚡',  atk:18,  cost:5  },
  { id:'atk_frost',   type:'attack',  name:'凍牙',        emoji:'❄️',  atk:13,  cost:3  },
  { id:'atk_giant',   type:'attack',  name:'巨人の拳',    emoji:'👊',  atk:22,  cost:6  },
  { id:'atk_curse',   type:'attack',  name:'呪詛',        emoji:'💢',  atk:9,   cost:2  },
  { id:'def_shield',  type:'defense', name:'鉄の盾',      emoji:'🛡️',  def:10,  cost:2  },
  { id:'def_barrier', type:'defense', name:'聖なる障壁',  emoji:'🔵',  def:15,  cost:4  },
  { id:'def_reflect', type:'defense', name:'鏡の守り',    emoji:'🪞',  def:8,   reflect:true, cost:3 },
  { id:'def_dodge',   type:'defense', name:'影踏み',      emoji:'💨',  def:999, cost:3  },
  { id:'def_stone',   type:'defense', name:'石の壁',      emoji:'🪨',  def:20,  cost:5  },
  { id:'itm_potion',  type:'item',    name:'秘薬',        emoji:'🧪',  heal:20, cost:3  },
  { id:'itm_mana',    type:'item',    name:'魔力の結晶',  emoji:'💎',  mp:15,   cost:2  },
  { id:'itm_coins',   type:'item',    name:'金貨袋',      emoji:'💰',  gold:15, cost:0  },
  { id:'itm_ambrosia',type:'item',    name:'甘露',        emoji:'✨',  heal:40, cost:6  },
  { id:'mir_smite',   type:'miracle', name:'神罰',        emoji:'☀️',  atk:25,  mpCost:15, cost:5 },
  { id:'mir_plague',  type:'miracle', name:'疫病',        emoji:'💀',  aoe:8,   mpCost:20, cost:6 },
  { id:'mir_bless',   type:'miracle', name:'祝福',        emoji:'🙌',  heal:30, mpCost:12, cost:4 },
  { id:'mir_drain',   type:'miracle', name:'魂の収奪',    emoji:'🌑',  drain:15,mpCost:10, cost:4 },
];

const WEIGHTS = { attack:35, defense:25, item:25, miracle:15 };

function drawCard() {
  const r = Math.random() * 100;
  let cum = 0, type = 'attack';
  for (const [t,w] of Object.entries(WEIGHTS)) { cum+=w; if(r<cum){type=t;break;} }
  const pool = CARD_POOL.filter(c=>c.type===type);
  return { ...pool[Math.floor(Math.random()*pool.length)], uid: Math.random().toString(36).substr(2,8) };
}
function drawHand(n=6) { return Array.from({length:n}, drawCard); }

// ---- CONSTANTS ----
const INIT_HP=100, INIT_MP=30, INIT_GOLD=20;
const MAX_HAND=18, MAX_PLAYERS=9;
const DEF_WINDOW_MS=4000;

// ---- STATE ----
let myName='', roomName='', isHost=false;
let myId=null, myPIdx=-1;
let peer=null, hostConn=null;
let guestConns={};
let GS=null;
let logEntries=[];
let selCardUid=null;
let pendingAtk=null;
let defTimerInterval=null, defTimeout=null;

// ---- PEERJS ----
function loadPeer(cb) {
  if(window.Peer){cb();return;}
  const s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  s.onload=cb; s.onerror=()=>setStatus('PeerJS load failed','err');
  document.head.appendChild(s);
}

// ---- UI ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setStatus(m,c=''){const e=document.getElementById('status-msg');e.textContent=m;e.className=c;}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function copyRoom(){navigator.clipboard?.writeText(roomName).then(()=>toast('コピーしました！'));}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ---- LOBBY ----
function getMyName(){return document.getElementById('inp-name').value.trim()||document.getElementById('inp-name2').value.trim()||'Prophet';}
function createRoom(){
  myName=document.getElementById('inp-name').value.trim()||'Prophet';
  roomName=document.getElementById('inp-room-create').value.trim();
  if(!roomName){setStatus('ルーム名を入力してください','err');return;}
  isHost=true; loadPeer(setupHost);
}
function joinRoom(){
  myName=document.getElementById('inp-name2').value.trim()||'Prophet';
  roomName=document.getElementById('inp-room-join').value.trim();
  if(!roomName){setStatus('ルーム名を入力してください','err');return;}
  isHost=false; loadPeer(setupGuest);
}

// ---- HOST ----
function hostPeerId(r){ return 'pf2-host-'+r.toLowerCase().replace(/[^a-z0-9]/g,'-').substring(0,18); }

function setupHost(){
  peer=new Peer(hostPeerId(roomName));
  peer.on('open',pid=>{
    myId=pid;
    GS=initGS();
    addPlayer(myId,myName);
    document.getElementById('wait-room-name').textContent=roomName;
    document.getElementById('btn-start').style.display='block';
    renderWaiting();
    showScreen('screen-waiting');
  });
  peer.on('connection',conn=>{
    guestConns[conn.peer]=conn;
    conn.on('open',()=>conn.send({type:'welcome',roomName}));
    conn.on('data',d=>hostRecv(conn.peer,d));
    conn.on('close',()=>{ delete guestConns[conn.peer]; onGuestDrop(conn.peer); });
    conn.on('error',()=>{ delete guestConns[conn.peer]; });
  });
  peer.on('error',e=>{
    if(e.type==='unavailable-id') setStatus('ルーム名が使われています','err');
    else setStatus('Error: '+e.message,'err');
  });
}

// ---- GUEST ----
let gRetry=0;
function setupGuest(){
  gRetry=0; peer=new Peer();
  peer.on('open',pid=>{ myId=pid; gConnect(); });
  peer.on('error',e=>setStatus('Error: '+e.message,'err'));
}
function gConnect(){
  gRetry++;
  setStatus('接続中... ('+gRetry+'/6)');
  const c=peer.connect(hostPeerId(roomName),{reliable:true});
  let opened=false;
  c.on('open',()=>{ opened=true; hostConn=c; hostConn.send({type:'join',name:myName,peerId:myId}); });
  c.on('data',guestRecv);
  c.on('close',()=>{ if(!opened&&gRetry<6){setTimeout(gConnect,1200);return;} if(GS?.phase==='playing'){toast('ホストとの接続が切れました');leaveRoom();} });
  c.on('error',()=>{ if(gRetry<6)setTimeout(gConnect,1200); else setStatus('ルームに接続できません','err'); });
}

// ---- HOST RECV ----
function hostRecv(pid,d){
  if(d.type==='join'){
    if(GS.phase!=='waiting'){guestConns[pid]?.send({type:'err',msg:'ゲームはすでに開始しています'});return;}
    if(GS.players.length>=MAX_PLAYERS){guestConns[pid]?.send({type:'err',msg:'ルームが満員です'});return;}
    addPlayer(pid,d.name);
    broadcastGS(); renderWaiting();
  }
  if(d.type==='action') processAction(pid,d.action);
}

// ---- GUEST RECV ----
function guestRecv(d){
  if(d.type==='welcome'){ document.getElementById('wait-room-name').textContent=d.roomName||roomName; showScreen('screen-waiting'); }
  if(d.type==='gs_update'){
    GS=d.gs;
    myPIdx=GS.players.findIndex(p=>p.peerId===myId);
    if(GS.phase==='waiting') renderWaiting();
    else if(GS.phase==='playing') renderGame();
    else if(GS.phase==='over') showOver();
  }
  if(d.type==='err') toast(d.msg);
  if(d.type==='atk_window'){ pendingAtk=d; showDefWindow(d); }
  if(d.type==='atk_resolved'){ clearDefWindow(); applyAtkResult(d); }
}

// ---- GS HELPERS ----
function initGS(){ return {players:[],turnIndex:0,phase:'waiting',round:0,hostPeerId:myId}; }
function addPlayer(pid,name){
  GS.players.push({peerId:pid,name,hp:INIT_HP,mp:INIT_MP,gold:INIT_GOLD,hand:drawHand(6),alive:true});
}
function sanitizeGS(){
  return {...GS, players:GS.players.map(p=>({...p,hand:p.hand.map(()=>null),handCount:p.hand.length}))};
}
function broadcastGS(){
  Object.entries(guestConns).forEach(([pid,conn])=>{
    const pIdx=GS.players.findIndex(p=>p.peerId===pid);
    const personal={...sanitizeGS()};
    if(pIdx>=0) personal.players=personal.players.map((p,i)=>i===pIdx?{...p,hand:GS.players[i].hand}:p);
    conn.send({type:'gs_update',gs:personal});
  });
  myPIdx=GS.players.findIndex(p=>p.peerId===myId);
  if(GS.phase==='waiting') renderWaiting();
  else if(GS.phase==='playing') renderGame();
  else if(GS.phase==='over') showOver();
}
function broadcastMsg(msg){ Object.values(guestConns).forEach(c=>c.send(msg)); }

function onGuestDrop(pid){
  if(!GS) return;
  const p=GS.players.find(p=>p.peerId===pid);
  if(!p) return;
  if(GS.phase==='waiting'){ GS.players=GS.players.filter(p=>p.peerId!==pid); broadcastGS(); renderWaiting(); }
  else if(GS.phase==='playing'){ p.alive=false; p.hp=0; addLog({type:'system',text:escH(p.name)+'が退場しました。'}); broadcastGS(); checkVictory(); }
}

// ---- WAITING UI ----
function renderWaiting(){
  const list=document.getElementById('wait-player-list');
  if(!list||!GS) return;
  list.innerHTML='';
  GS.players.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='player-item';
    const badges=[];
    if(i===0) badges.push('<span class="badge badge-host">HOST</span>');
    if(p.peerId===myId) badges.push('<span class="badge badge-you">YOU</span>');
    el.innerHTML=badges.join('')+'<span>'+escH(p.name)+'</span>';
    list.appendChild(el);
  });
  if(isHost){
    const btn=document.getElementById('btn-start');
    const n=GS.players.length;
    btn.textContent=n>=2?`▶ BEGIN (${n}人)`:'▶ BEGIN (2人以上必要)';
    btn.disabled=n<2;
  }
}

// ---- START ----
function hostStart(){
  if(!isHost||GS.players.length<2) return;
  GS.phase='playing'; GS.round=1; GS.turnIndex=0; logEntries=[];
  addLog({type:'system',text:'予言が始まった。第1ラウンド。'});
  broadcastGS();
  showScreen('screen-game');
}

// ---- RENDER GAME ----
function renderGame(){
  showScreen('screen-game');
  if(!GS) return;
  const me=GS.players[myPIdx>=0?myPIdx:0];
  if(!me) return;

  const turnP=GS.players[GS.turnIndex];
  const isMyTurn=turnP?.peerId===myId;

  // Header badge
  document.getElementById('gf-badge').textContent=`G.F.${GS.round} / 100`;

  // My stats
  document.getElementById('my-name-label').textContent=me.name;
  document.getElementById('my-hp').textContent=me.hp;
  document.getElementById('my-mp').textContent=me.mp;
  document.getElementById('my-gold').textContent=me.gold;
  document.getElementById('my-hand-ct').textContent='✋ '+(me.hand?.filter(Boolean).length||0);
  document.getElementById('footer-myname').textContent=me.name;

  // Player scroll (left panel)
  renderPlayerList();

  // Footer mini bars
  renderFooterPlayers();

  // Hand
  renderHand(me, isMyTurn);

  // Target
  renderTargetSel(isMyTurn);

  // Buttons
  document.getElementById('btn-attack').disabled=!isMyTurn||!selCardUid;
  document.getElementById('btn-pray').disabled=!isMyTurn;
  document.getElementById('btn-end').disabled=!isMyTurn;

  // Log
  renderLog();
}

function renderPlayerList(){
  const el=document.getElementById('player-scroll');
  if(!el||!GS) return;
  el.innerHTML='';
  GS.players.forEach((p,i)=>{
    const isMe=p.peerId===myId;
    const isTurn=i===GS.turnIndex&&p.alive;
    const div=document.createElement('div');
    div.className='pbar'+(isTurn?' active-turn':'')+(isMe?' me':'')+(p.alive?'':' dead');
    div.innerHTML=`
      <div class="pbar-dot"></div>
      <div class="turn-arrow">→</div>
      <div class="pbar-name">${escH(p.name)}</div>
      <div class="pbar-stats">
        <span class="pbar-hp">HP${p.hp}</span>
        <span class="pbar-mp">MP${p.mp}</span>
        <span class="pbar-gd">¥${p.gold}</span>
      </div>
    `;
    el.appendChild(div);
  });
}

function renderFooterPlayers(){
  const el=document.getElementById('footer-players');
  if(!el||!GS) return;
  el.innerHTML='';
  GS.players.forEach(p=>{
    const isMe=p.peerId===myId;
    const isTurn=GS.players[GS.turnIndex]?.peerId===p.peerId;
    const bar=document.createElement('div');
    bar.style.cssText=`display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.2);border-radius:4px;padding:2px 5px;font-size:0.6rem;font-weight:700;color:#fff;${isTurn?'background:rgba(255,220,50,0.35);':''}${!p.alive?'opacity:0.35;':''}`;
    bar.textContent=p.name.substring(0,4)+(isMe?'●':'');
    el.appendChild(bar);
  });
}

let selectedCardData=null;
function renderHand(me,isMyTurn){
  const area=document.getElementById('hand-area');
  if(!area) return;
  area.innerHTML='';
  (me.hand||[]).filter(Boolean).forEach(card=>{
    const isSelected=card.uid===selCardUid;
    const isDefenseMode=!!pendingAtk;
    const canUse=isMyTurn&&!isDefenseMode;
    const isDefCard=card.type==='defense';
    const canDefend=isDefenseMode&&isDefCard&&GS.players[myPIdx]?.peerId===pendingAtk?.targetId;

    const div=document.createElement('div');
    div.className='card'+(isSelected?' selected':'');
    if(canDefend) div.classList.add('defense-highlight');
    if(!canUse&&!canDefend) div.classList.add('disabled');
    div.dataset.type=card.type;

    const costLabel=card.mpCost?`🔮${card.mpCost}`:(card.cost?`¥${card.cost}`:'');
    div.innerHTML=`
      <div class="card-icon">${card.emoji}</div>
      <div class="card-footer">
        <span class="card-stat">${cardStatStr(card)}</span>
        ${costLabel?`<span class="card-cost">${costLabel}</span>`:''}
      </div>
    `;
    div.title=card.name;
    div.onclick=()=>{
      if(canDefend){ submitDefense(card.uid); return; }
      if(!canUse) return;
      selCardUid=selCardUid===card.uid?null:card.uid;
      selectedCardData=selCardUid?card:null;
      renderHand(me,isMyTurn);
      updateActiveCardDisplay(selCardUid?card:null);
      document.getElementById('btn-attack').disabled=!selCardUid;
    };
    area.appendChild(div);
  });
}

function cardStatStr(c){
  if(c.def===999) return '💨DODGE';
  if(c.atk)  return '攻'+c.atk;
  if(c.def)  return '守'+c.def;
  if(c.heal) return '+HP'+c.heal;
  if(c.mp)   return '+MP'+c.mp;
  if(c.gold) return '+¥'+c.gold;
  if(c.aoe)  return '全'+c.aoe;
  if(c.drain)return '奪'+c.drain;
  return '—';
}

function updateActiveCardDisplay(card){
  const el=document.getElementById('active-card-display');
  const big=document.getElementById('atk-big-display');
  if(!card){ el.classList.add('empty'); big.classList.remove('active'); return; }
  el.classList.remove('empty');
  document.getElementById('acd-icon').textContent=card.emoji;
  document.getElementById('acd-name').textContent=card.name;
  document.getElementById('acd-stat').textContent=cardStatStr(card);
  document.getElementById('acd-cost').textContent='¥'+(card.cost||0);
  if(card.atk||card.aoe||card.drain){
    big.classList.add('active');
    big.textContent='攻'+(card.atk||card.aoe||card.drain);
  } else {
    big.classList.remove('active');
  }
}

function renderTargetSel(isMyTurn){
  const sel=document.getElementById('target-select');
  const prev=sel.value;
  sel.innerHTML='';
  GS.players.forEach(p=>{
    if(!p.alive||p.peerId===myId) return;
    const opt=document.createElement('option');
    opt.value=p.peerId;
    opt.textContent=p.name;
    sel.appendChild(opt);
  });
  if(prev) sel.value=prev;
}

// ---- ACTIONS ----
function sendAction(action){
  if(isHost) processAction(myId,action);
  else hostConn?.send({type:'action',action});
}

function doPlay(){
  if(!selCardUid){ toast('カードを選んでください'); return; }
  const me=GS.players[myPIdx];
  const card=me?.hand?.find(c=>c&&c.uid===selCardUid);
  if(!card) return;

  if(card.type==='item'||(card.type==='miracle'&&card.heal)){
    sendAction({type:'use_item',cardUid:selCardUid});
    selCardUid=null; selectedCardData=null;
    updateActiveCardDisplay(null);
    return;
  }
  const targetId=document.getElementById('target-select').value;
  if(!targetId&&!card.aoe){ toast('ターゲットを選んでください'); return; }
  sendAction({type:'attack',cardUid:selCardUid,targetId});
  selCardUid=null; selectedCardData=null;
  updateActiveCardDisplay(null);
}

function doPray(){ sendAction({type:'pray'}); }
function doEnd() { sendAction({type:'end_turn'}); }

// ---- PROCESS ACTIONS (HOST) ----
function processAction(pid,action){
  const pIdx=GS.players.findIndex(p=>p.peerId===pid);
  if(pIdx<0) return;
  const player=GS.players[pIdx];

  if(action.type==='attack'){
    if(GS.turnIndex!==pIdx){ guestConns[pid]?.send({type:'err',msg:'あなたのターンではありません'}); return; }
    const card=player.hand.find(c=>c&&c.uid===action.cardUid);
    if(!card) return;
    if(card.type!=='attack'&&card.type!=='miracle'){ guestConns[pid]?.send({type:'err',msg:'攻撃カードではありません'}); return; }
    if(card.mpCost&&player.mp<card.mpCost){
      const msg='MPが足りません';
      guestConns[pid]?.send({type:'err',msg}); if(isHost&&pid===myId) toast(msg); return;
    }
    if(card.mpCost) player.mp-=card.mpCost;
    player.hand=player.hand.filter(c=>!c||c.uid!==action.cardUid);

    // AOE
    if(card.aoe){
      GS.players.forEach(p=>{ if(p.alive&&p.peerId!==pid){ p.hp=Math.max(0,p.hp-card.aoe); checkDeath(p); } });
      addLog({type:'attack',actor:player.name,target:'全員',card:card.name,emoji:card.emoji,dmg:card.aoe,blocked:0,reflected:0});
      setOppAction(card,cardStatStr(card));
      broadcastGS(); checkVictory(); return;
    }
    // Drain
    if(card.drain){
      const tgt=GS.players.find(p=>p.peerId===action.targetId&&p.alive);
      if(!tgt) return;
      const actual=Math.min(card.drain,tgt.hp);
      tgt.hp-=actual; player.hp=Math.min(INIT_HP,player.hp+actual);
      addLog({type:'attack',actor:player.name,target:tgt.name,card:card.name,emoji:card.emoji,dmg:actual,blocked:0,reflected:0});
      setOppAction(card,cardStatStr(card));
      checkDeath(tgt); broadcastGS(); checkVictory(); return;
    }
    // Normal attack → defense window
    const tgt=GS.players.find(p=>p.peerId===action.targetId&&p.alive);
    if(!tgt) return;
    pendingAtk={attackerId:pid,targetId:action.targetId,cardUid:action.cardUid,cardName:card.name,cardEmoji:card.emoji,damage:card.atk,attackerName:player.name,targetName:tgt.name};
    broadcastMsg({type:'atk_window',...pendingAtk});
    // Also show on host side
    if(isHost){ showDefWindow(pendingAtk); }
    startDefTimer();
  }

  if(action.type==='defend'){
    if(!pendingAtk||pendingAtk.targetId!==pid) return;
    const tgt=GS.players.find(p=>p.peerId===pid);
    if(!tgt) return;
    const defCard=tgt.hand.find(c=>c&&c.uid===action.cardUid);
    if(!defCard||defCard.type!=='defense') return;
    tgt.hand=tgt.hand.filter(c=>!c||c.uid!==action.cardUid);
    resolveAtk(defCard);
  }

  if(action.type==='pray'){
    if(GS.turnIndex!==pIdx) return;
    if(player.hand.length>=MAX_HAND){ const m='手札がいっぱいです'; guestConns[pid]?.send({type:'err',msg:m}); if(isHost&&pid===myId)toast(m); return; }
    const drawn=Array.from({length:1},drawCard);
    drawn.forEach(c=>player.hand.push(c));
    addLog({type:'system',text:escH(player.name)+'は祈りを捧げ、カードを1枚引いた。'});
    advanceTurn(); broadcastGS();
  }

  if(action.type==='end_turn'){
    if(GS.turnIndex!==pIdx) return;
    const next=nextAliveName();
    addLog({type:'system',text:escH(player.name)+'のターン終了。→ '+escH(next)});
    advanceTurn(); broadcastGS();
  }

  if(action.type==='use_item'){
    if(GS.turnIndex!==pIdx) return;
    const card=player.hand.find(c=>c&&c.uid===action.cardUid);
    if(!card||(card.type!=='item'&&!(card.type==='miracle'&&card.heal))) return;
    player.hand=player.hand.filter(c=>!c||c.uid!==action.cardUid);
    let detail='';
    if(card.heal){ player.hp=Math.min(INIT_HP,player.hp+card.heal); detail='+'+card.heal+' HP'; }
    if(card.mp)  { player.mp=Math.min(99,player.mp+card.mp); detail='+'+card.mp+' MP'; }
    if(card.gold){ player.gold+=card.gold; detail='+¥'+card.gold; }
    addLog({type:'item',actor:player.name,card:card.name,emoji:card.emoji,detail});
    setOppAction(card,detail);
    broadcastGS();
  }
}

// ---- DEF TIMER (HOST) ----
function startDefTimer(){
  clearDefTimerH();
  defTimeout=setTimeout(()=>resolveAtk(null), DEF_WINDOW_MS);
}
function clearDefTimerH(){ if(defTimeout){clearTimeout(defTimeout);defTimeout=null;} }

function resolveAtk(defCard){
  clearDefTimerH();
  if(!pendingAtk) return;
  const atk=GS.players.find(p=>p.peerId===pendingAtk.attackerId);
  const tgt=GS.players.find(p=>p.peerId===pendingAtk.targetId);
  if(!atk||!tgt){ pendingAtk=null; return; }

  let dmg=pendingAtk.damage, blocked=0, reflected=0;
  if(defCard){
    if(defCard.def===999){ blocked=dmg; dmg=0; }
    else if(defCard.reflect){ reflected=Math.floor(defCard.def/2); blocked=defCard.def; dmg=Math.max(0,dmg-defCard.def); atk.hp=Math.max(0,atk.hp-reflected); }
    else { blocked=Math.min(defCard.def,dmg); dmg=Math.max(0,dmg-defCard.def); }
  }
  tgt.hp=Math.max(0,tgt.hp-dmg);

  const atkCard={emoji:pendingAtk.cardEmoji,name:pendingAtk.cardName};
  addLog({type:'attack',actor:atk.name,target:tgt.name,card:pendingAtk.cardName,emoji:pendingAtk.cardEmoji,dmg,blocked,reflected});
  setOppAction(atkCard, '攻'+pendingAtk.damage+(blocked?` → 守${blocked}`:'')+` → ${dmg}ダメージ`);

  broadcastMsg({type:'atk_resolved',dmg,blocked,reflected,targetName:tgt.name});
  clearDefWindow();

  pendingAtk=null;
  checkDeath(tgt);
  if(reflected) checkDeath(atk);
  broadcastGS(); checkVictory();
}

function checkDeath(p){
  if(p.alive&&p.hp<=0){ p.alive=false; p.hp=0; addLog({type:'dead',name:p.name}); }
}
function nextAliveName(){
  let next=(GS.turnIndex+1)%GS.players.length, t=0;
  while(!GS.players[next].alive&&t<GS.players.length){next=(next+1)%GS.players.length;t++;}
  return GS.players[next]?.name||'—';
}
function advanceTurn(){
  let next=(GS.turnIndex+1)%GS.players.length, t=0;
  while(!GS.players[next].alive&&t<GS.players.length){next=(next+1)%GS.players.length;t++;}
  GS.turnIndex=next;
  GS.round=Math.floor(GS.players.filter(p=>p.alive).length>0?GS.round+(next===0?1:0):GS.round);
}
function checkVictory(){
  const alive=GS.players.filter(p=>p.alive);
  if(alive.length<=1){
    GS.phase='over'; GS.winner=alive[0]?.name||null;
    addLog({type:'system',text:alive[0]?escH(alive[0].name)+'が予言の覇者となった！':'全員が倒れた。'});
    broadcastGS(); showOver();
  }
}

// ---- DEF WINDOW (CLIENT) ----
function showDefWindow(d){
  const win=document.getElementById('defense-window');
  const amTarget=GS.players[myPIdx]?.peerId===d.targetId;
  document.getElementById('def-text').innerHTML=
    `<span class="attacker">${escH(d.attackerName)}</span>が<strong>${escH(d.targetName)}</strong>に`+
    `<span class="def-card-name">${d.cardEmoji} ${escH(d.cardName)}</span>で<strong style="color:var(--red2)">${d.damage}ダメージ</strong>の攻撃！`+
    (amTarget?'<br><span style="color:var(--blue2)">防御カードを出して防げ！</span>':'');
  win.classList.add('active');
  let secs=Math.ceil(DEF_WINDOW_MS/1000);
  document.getElementById('def-timer').textContent=secs;
  if(defTimerInterval) clearInterval(defTimerInterval);
  defTimerInterval=setInterval(()=>{
    secs--; const e=document.getElementById('def-timer');
    if(e) e.textContent=Math.max(0,secs);
    if(secs<=0) clearInterval(defTimerInterval);
  },1000);
  if(amTarget) renderHand(GS.players[myPIdx], false);
}

function clearDefWindow(){
  document.getElementById('defense-window').classList.remove('active');
  if(defTimerInterval) clearInterval(defTimerInterval);
  pendingAtk=null;
  const me=GS?.players?.[myPIdx];
  const isMyTurn=GS?.players?.[GS?.turnIndex]?.peerId===myId;
  if(me) renderHand(me,isMyTurn);
}

function submitDefense(uid){ sendAction({type:'defend',cardUid:uid}); clearDefWindow(); }

function applyAtkResult(d){
  if(d.dmg>0) floatDmg('-'+d.dmg,'#e74c3c');
  else if(d.blocked) floatDmg('BLOCKED!','#5dade2');
}

// ---- OPP ACTION (「起こした奇跡」) ----
function setOppAction(card,statStr){
  document.getElementById('opp-icon').textContent=card.emoji||'—';
  document.getElementById('opp-name').textContent=card.name||'—';
  document.getElementById('opp-stat').textContent=statStr||'—';
}

// ---- LOG ----
function addLog(e){ logEntries.push(e); if(logEntries.length>100) logEntries.shift(); renderLog(); }
function renderLog(){
  const el=document.getElementById('battle-log');
  if(!el) return;
  const atBottom=el.scrollHeight-el.clientHeight<=el.scrollTop+40;
  el.innerHTML=logEntries.map(logHTML).join('');
  if(atBottom) el.scrollTop=el.scrollHeight;
}
function logHTML(e){
  if(e.type==='system') return `<div class="log-line system">${e.text}</div>`;
  if(e.type==='attack'){
    const def=e.blocked?` <span style="color:var(--blue2)">（守${e.blocked}）</span>`:'';
    const ref=e.reflected?` <span style="color:#9b59b6">（反射${e.reflected}）</span>`:'';
    return `<div class="log-line attack"><span class="log-actor">${escH(e.actor)}</span>→<span class="log-target">${escH(e.target)}</span> <span class="log-card">${e.emoji||''} ${escH(e.card)}</span> <span class="log-val" style="color:var(--red2)">${e.dmg}ダメージ</span>${def}${ref}</div>`;
  }
  if(e.type==='item') return `<div class="log-line item"><span class="log-actor">${escH(e.actor)}</span> ${e.emoji||''} <span class="log-card">${escH(e.card)}</span>${e.detail?' — <span class="log-val">'+escH(e.detail)+'</span>':''}</div>`;
  if(e.type==='dead') return `<div class="log-line dead">💀 ${escH(e.name)} は倒れた！</div>`;
  return `<div class="log-line system">${escH(JSON.stringify(e))}</div>`;
}
function scrollLogBottom(){ const el=document.getElementById('battle-log'); if(el) el.scrollTop=el.scrollHeight; }
function toggleLog(){} // placeholder

// ---- GAME OVER ----
function showOver(){
  const ov=document.getElementById('overlay');
  const winner=GS?.winner;
  const iWon=winner&&GS.players[myPIdx]?.name===winner;
  document.getElementById('ov-title').textContent=iWon?'⚜ 勝利！':(winner?'敗北':'— 引き分け —');
  document.getElementById('ov-title').style.color=iWon?'var(--gold2)':'var(--red2)';
  document.getElementById('ov-sub').textContent=winner?winner+'が次なる神となった。':'予言は終わりを告げた。';
  ov.classList.add('active');
}

// ---- FLOAT DMG ----
function floatDmg(txt,color){
  const el=document.createElement('div');
  el.className='float-dmg';
  el.textContent=txt; el.style.color=color;
  el.style.left=(window.innerWidth/2-30+Math.random()*60)+'px';
  el.style.top=(window.innerHeight*0.5+Math.random()*30)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ---- LEAVE ----
function leaveRoom(){
  clearDefTimerH();
  if(peer){peer.destroy();peer=null;}
  hostConn=null; guestConns={};
  GS=null; logEntries=[];
  selCardUid=null; selectedCardData=null; pendingAtk=null;
  myPIdx=-1; myId=null; isHost=false;
  document.getElementById('overlay').classList.remove('active');
  showScreen('screen-lobby');
  setStatus('Awaiting the call of fate...');
}
</script>
